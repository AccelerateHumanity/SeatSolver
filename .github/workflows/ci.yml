name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew runTests

      - name: Run E2E tests
        run: ./gradlew runE2ETests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: SeatSolver
          path: build/libs/SeatSolver-*.jar
