name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew jar

      - name: Rename JAR
        run: cp build/libs/SeatSolver-*.jar SeatSolver.jar

      - uses: actions/upload-artifact@v4
        with:
          name: jar
          path: SeatSolver.jar

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Windows distribution
        run: ./gradlew zipAppImage

      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/distributions/SeatSolver-*-Windows.zip

  release:
    needs: [build-jar, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jar

      - uses: actions/download-artifact@v4
        with:
          name: windows-app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SeatSolver.jar
            SeatSolver-Windows.zip
          generate_release_notes: true
