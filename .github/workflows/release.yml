name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew jar

      - name: Rename JAR
        run: cp build/libs/SeatSolver-*.jar SeatSolver.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SeatSolver.jar
          generate_release_notes: true
